<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy 1 Month ❤️</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#ffeef2;
    padding:50px;
}
.card{
    background:white;
    max-width:600px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}
button{
    padding:12px 24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
<h1>💖 Happy 1 Month 💖</h1>

<p>
สุขสันต์ครบรอบ 1 เดือนนะคนเก่ง
</p>
  

<p>
ขอบคุณที่เข้ามาเป็นความสุขในทุกวันของเรา ❤️
</p>

<button onclick="showMessage()">
กดตรงนี้สิ 😊
</button>

<p id="message"></p>
</div>

<script>
function showMessage(){
document.getElementById("message").innerHTML =
"อยู่ด้วยกันไปนานๆนะ 💕";
}
</script>

</body>
</html>
